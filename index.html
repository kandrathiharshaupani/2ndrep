<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storm Weather</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1f3a 0%, #2d2855 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .cloud-container {
      position: relative;
      width: 320px;
      height: 280px;
      margin: 0 auto 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2a3f7f 0%, #3d5a99 100%);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    /* Cloud Shape */
    .cloud {
      position: relative;
      width: 180px;
      height: 90px;
      background: #f5f7fa;
      border-radius: 90px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.15));
    }

    .cloud::before {
      content: '';
      position: absolute;
      left: 15px;
      top: -35px;
      width: 75px;
      height: 75px;
      background: #f5f7fa;
      border-radius: 50%;
      box-shadow: 90px 0 0 -15px #f5f7fa, 180px 10px 0 -20px #f5f7fa;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
    }

    /* Lightning Bolt */
    .lightning {
      position: absolute;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 100px;
      background: linear-gradient(180deg, #00e5ff 0%, #00bfff 50%, #0099ff 100%);
      clip-path: polygon(20% 0%, 80% 0%, 35% 40%, 65% 40%, 10% 100%, 45% 55%, 15% 55%);
      filter: drop-shadow(0 0 30px #00d4ff) drop-shadow(0 0 15px #0099ff);
      animation: lightning-flash 2s ease-in-out infinite;
    }

    /* Particle Effect */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00d4ff;
      border-radius: 50%;
      box-shadow: 0 0 8px #00d4ff;
      animation: fall linear infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    @keyframes lightning-flash {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes fall {
      to { transform: translateY(100px); opacity: 0; }
    }

    /* Search Section */
    .search-section {
      margin-top: 40px;
    }

    h1 {
      color: white;
      font-size: 2.5em;
      margin-bottom: 30px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .search-box {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    input {
      padding: 15px 20px;
      width: 280px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1em;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    input:focus {
      border-color: #00d4ff;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    button {
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      color: white;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
    }

    button:active {
      transform: translateY(0px);
    }

    .weather {
      margin-top: 30px;
      color: white;
    }

    .weather h3 {
      font-size: 1.8em;
      margin-bottom: 15px;
      color: #00d4ff;
    }

    .temp {
      font-size: 3em;
      font-weight: bold;
      margin: 15px 0;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .weather p {
      font-size: 1.1em;
      margin: 10px 0;
      color: rgba(255, 255, 255, 0.8);
      text-transform: capitalize;
    }

    /* Background particles */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .bg-particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 212, 255, 0.5);
      border-radius: 50%;
    }

  </style>
</head>
<body>

  <div class="bg-particles" id="bgParticles"></div>

  <div class="container">
    <h1>Storm Weather</h1>
    
    <div class="cloud-container">
      <div class="particles" id="particles"></div>
      <div class="cloud">
        <div class="lightning"></div>
      </div>
    </div>

    <div class="search-section">
      <div class="search-box">
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>
      </div>

      <div class="weather" id="weatherResult"></div>
    </div>
  </div>

  <script>
    // Generate background particles
    function generateBgParticles() {
      const container = document.getElementById('bgParticles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'bg-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animation = `float 3s ease-in-out ${Math.random() * 3}s infinite`;
        container.appendChild(particle);
      }
    }

    // Generate particles around cloud
    function generateCloudParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 8; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 200 + 50 + 'px';
        particle.style.top = Math.random() * 100 + 50 + 'px';
        particle.style.animationDuration = (Math.random() * 1 + 1) + 's';
        particle.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(particle);
      }
    }

    async function getWeather() {
      const city = document.getElementById("city").value || "London";
      
      // Mock weather data
      const mockData = {
        "London": { temp: 18, description: "Stormy clouds with thunder", humidity: 85, wind: 12, country: "GB" },
        "New York": { temp: 22, description: "Thunderstorm", humidity: 78, wind: 15, country: "US" },
        "Tokyo": { temp: 25, description: "Heavy rain", humidity: 90, wind: 10, country: "JP" },
        "Paris": { temp: 16, description: "Storm approaching", humidity: 88, wind: 14, country: "FR" },
        "Sydney": { temp: 28, description: "Lightning storm", humidity: 75, wind: 18, country: "AU" }
      };

      // Get mock data or default to a random city
      const data = mockData[city] || mockData["London"];

      const weatherHTML = `
        <h3>${city}, ${data.country}</h3>
        <div class="temp">${data.temp}°C</div>
        <p>⛈️ ${data.description}</p>
        <p>💧 Humidity: ${data.humidity}%</p>
        <p>💨 Wind Speed: ${data.wind} m/s</p>
      `;

      document.getElementById("weatherResult").innerHTML = weatherHTML;
    }

    // Auto-load weather on page load
    window.addEventListener('DOMContentLoaded', () => {
      generateBgParticles();
      generateCloudParticles();
      getWeather(); // Display default weather
    });

    // Allow Enter key to search
    document.getElementById('city').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        getWeather();
      }
    });
  </script>

</body>
</html>
